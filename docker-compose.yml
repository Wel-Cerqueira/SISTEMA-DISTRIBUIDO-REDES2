networks:
  ormuz-net:
    driver: bridge

services:
  # BROKERS (4 setores)
  broker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: broker-1
    networks:
      - ormuz-net
    environment:
      BROKER_ID: "broker-1"
      PORT_TCP: "9000"
      PORT_UDP: "9001"
      PORT_SENSORES: "9002"
      BROKER_HOST: "broker-1"
      BROKER_CALLBACK: "broker-1:9000"
      # Formato: ID,TCP,UDP;ID,TCP,UDP;...
      PEERS: "broker-2,broker-2:9010,broker-2:9011;broker-3,broker-3:9020,broker-3:9021;broker-4,broker-4:9030,broker-4:9031"
    command:
      - "-id=broker-1"
      - "-porta-tcp=:9000"
      - "-porta-udp=:9001"
      - "-porta-ctrl=:9002"
      - "-drones=drone-01=drone-01:9101,drone-02=drone-02:9101"
      - "-peers=broker-2,broker-2:9010,broker-2:9011;broker-3,broker-3:9020,broker-3:9021;broker-4,broker-4:9030,broker-4:9031"
    ports:
      - "9000:9000/tcp"
      - "9001:9001/udp"
      - "9002:9002/tcp"
    extra_hosts:
      - "broker-1:127.0.0.1"
      - "broker-2:172.18.0.12"
      - "broker-3:172.18.0.13"
      - "broker-4:172.18.0.14"
    restart: unless-stopped

  broker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: broker-2
    networks:
      - ormuz-net
    environment:
      BROKER_ID: "broker-2"
      PORT_TCP: "9010"
      PORT_UDP: "9011"
      PORT_SENSORES: "9012"
      BROKER_HOST: "broker-2"
      BROKER_CALLBACK: "broker-2:9010"
      PEERS: "broker-1,broker-1:9000,broker-1:9001;broker-3,broker-3:9020,broker-3:9021;broker-4,broker-4:9030,broker-4:9031"
    command:
      - "-id=broker-2"
      - "-porta-tcp=:9010"
      - "-porta-udp=:9011"
      - "-porta-ctrl=:9012"
      - "-drones=drone-03=drone-03:9101,drone-04=drone-04:9101"
      - "-peers=broker-1,broker-1:9000,broker-1:9001;broker-3,broker-3:9020,broker-3:9021;broker-4,broker-4:9030,broker-4:9031"
    ports:
      - "9010:9010/tcp"
      - "9011:9011/udp"
      - "9012:9012/tcp"
    extra_hosts:
      - "broker-1:172.18.0.11"
      - "broker-2:127.0.0.1"
      - "broker-3:172.18.0.13"
      - "broker-4:172.18.0.14"
    restart: unless-stopped

  broker-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: broker-3
    networks:
      - ormuz-net
    environment:
      BROKER_ID: "broker-3"
      PORT_TCP: "9020"
      PORT_UDP: "9021"
      PORT_SENSORES: "9022"
      BROKER_HOST: "broker-3"
      BROKER_CALLBACK: "broker-3:9020"
      PEERS: "broker-1,broker-1:9000,broker-1:9001;broker-2,broker-2:9010,broker-2:9011;broker-4,broker-4:9030,broker-4:9031"
    command:
      - "-id=broker-3"
      - "-porta-tcp=:9020"
      - "-porta-udp=:9021"
      - "-porta-ctrl=:9022"
      - "-drones=drone-05=drone-05:9101,drone-06=drone-06:9101"
      - "-peers=broker-1,broker-1:9000,broker-1:9001;broker-2,broker-2:9010,broker-2:9011;broker-4,broker-4:9030,broker-4:9031"
    ports:
