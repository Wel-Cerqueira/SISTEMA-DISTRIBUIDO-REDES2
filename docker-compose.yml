    restart: unless-stopped

  drone-08:
    build:
      context: .
      dockerfile: Dockerfile.drone
    container_name: drone-08
    networks:
      - ormuz-net
    environment:
      DRONE_ID: "drone-08"
      DRONE_PORT: ":9101"
    ports:
      - "9108:9101/tcp"
    restart: unless-stopped

  # SENSORES (3 por broker = 12 sensores total)
  # BROKER 1 - Setor Norte (3 sensores)
  sensor-s1-movimento:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    container_name: sensor-s1-mov
    networks:
      - ormuz-net
    environment:
      SENSOR_ID: "sensor-s1-mov"
      SENSOR_TIPO: "movimento"
      LOCALIZACAO: "setor-norte-1"
      BROKERS: "broker-1:9002"
    depends_on:
      - broker-1
    restart: unless-stopped

  sensor-s1-pressao:
