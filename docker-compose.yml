    command:
      - "-id=broker-4"
      - "-porta-tcp=:9030"
      - "-porta-udp=:9031"
      - "-porta-ctrl=:9032"
      - "-drones=drone-07=drone-07:9101,drone-08=drone-08:9101"
      - "-peers=broker-1,broker-1:9000,broker-1:9001;broker-2,broker-2:9010,broker-2:9011;broker-3,broker-3:9020,broker-3:9021"
    ports:
      - "9030:9030/tcp"
      - "9031:9031/udp"
      - "9032:9032/tcp"
    extra_hosts:
      - "broker-1:172.18.0.11"
      - "broker-2:172.18.0.12"
      - "broker-3:172.18.0.13"
      - "broker-4:127.0.0.1"
    restart: unless-stopped

  # DRONES (8 no total)
  drone-01:
    build:
      context: .
